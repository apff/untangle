server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # The dependency report is large JSON (~1.5 MB); gzip drops it to ~200 KB.
    gzip on;
    gzip_types application/json application/javascript text/css;
    gzip_min_length 1024;

    # Data is refreshed on a timer in the background; let clients revalidate.
    location /data/ {
        add_header Cache-Control "no-cache";
    }

    # Static assets change only on redeploy; cache briefly.
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=300";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
