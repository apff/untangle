<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Untangle — dependency graph</title>
  <link rel="icon" type="image/svg+xml" href="img/logo.svg">
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="stylesheet" href="fonts/fonts.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="theme-midnight">
  <header>
    <div class="brand"><img class="logo" src="img/logo.svg" alt="" width="26" height="26"><span data-brand>Untangle</span></div>
    <a class="nav-link" id="overviewLink" href="#" title="Fit the whole graph">Overview</a>
    <div class="spacer"></div>
    <span id="stale" class="stale" hidden></span>
  </header>

  <div class="controls">
    <div class="search-wrap"><input id="search" type="text" placeholder="Filter repos…" autocomplete="off"></div>
    <div id="legend"></div>
    <button id="themeToggle" class="mode-toggle" type="button" role="switch" title="Toggle light / dark" aria-label="Toggle light or dark mode"><span class="mt-track"><span class="mt-ico mt-moon">☾</span><span class="mt-ico mt-sun">☀</span><span class="mt-knob"></span></span></button>
  </div>

  <div class="stage">
    <div class="cy-wrap"><div id="cy"></div><div id="titles"></div></div>
    <aside id="detail"></aside>
  </div>

  <footer id="footer">Untangle · generated from git dependency analysis</footer>

  <div id="error-banner" class="error-banner" hidden></div>

  <script src="vendor/cytoscape.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
